[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g corepack && corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --import=./artifacts/api-server/load-env.mjs ./artifacts/api-server/dist/index.mjs"
