version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eliteescorts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eliteescorts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./schema/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eliteescorts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
