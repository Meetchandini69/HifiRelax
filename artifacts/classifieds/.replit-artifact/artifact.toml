kind = "web"
previewPath = "/classifieds/"
title = "Escorts Classifieds Platform"
version = "1.0.0"
id = "artifacts/classifieds"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/classifieds/" ]
localPort = 25377

[services.development]
run = "pnpm --filter @workspace/classifieds run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/classifieds", "run", "build" ]
publicDir = "artifacts/classifieds/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25377"
BASE_PATH = "/classifieds/"
