[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g corepack && corepack enable && corepack prepare pnpm@10.26.1 --activate && cd ../.. && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = [
  "cd ../.. && pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --import=./load-env.mjs ./dist/index.mjs"
