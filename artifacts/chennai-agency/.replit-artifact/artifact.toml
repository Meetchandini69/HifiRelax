kind = "web"
previewPath = "/"
title = "Chennai Call Girls Services Agency"
version = "1.0.0"
id = "artifacts/chennai-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22463

[services.development]
run = "pnpm --filter @workspace/chennai-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chennai-agency", "run", "build" ]
publicDir = "artifacts/chennai-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22463"
BASE_PATH = "/"
