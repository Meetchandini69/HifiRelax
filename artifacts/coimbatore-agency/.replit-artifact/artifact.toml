kind = "web"
previewPath = "/coimbatore/"
title = "Coimbatore Call Girls Agency"
version = "1.0.0"
id = "artifacts/coimbatore-agency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/coimbatore/" ]
localPort = 19493

[services.development]
run = "pnpm --filter @workspace/coimbatore-agency run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coimbatore-agency", "run", "build" ]
publicDir = "artifacts/coimbatore-agency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19493"
BASE_PATH = "/coimbatore/"
